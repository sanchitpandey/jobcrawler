<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JobCrawler — Checkout</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      text-align: center;
    }
    h1 { font-size: 18px; font-weight: 600; color: #111827; margin-bottom: 8px; }
    p  { font-size: 13px; color: #6b7280; margin-bottom: 16px; }
    .status { font-size: 13px; margin-top: 16px; min-height: 20px; }
    .ok { color: #059669; }
    .err { color: #dc2626; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #e5e7eb;
      border-top-color: #2563eb; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 16px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>JobCrawler Pro</h1>
    <p id="plan-info">Loading…</p>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status"></div>
  </div>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="dist/checkout.js" type="module"></script>
</body>
</html>
