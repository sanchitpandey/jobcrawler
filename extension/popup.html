<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JobCrawler</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 20px 12px;
      border-bottom: 1px solid #e5e7eb;
    }

    .header-logo {
      width: 20px;
      height: 20px;
      background: #2563eb;
      border-radius: 4px;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      letter-spacing: -0.01em;
    }

    /* ── Login view ─────────────────────────────────────────────── */

    #login-view {
      padding: 20px;
    }

    #login-view p.subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 16px;
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 4px;
    }

    .field input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      color: #111827;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
    }

    #login-error {
      font-size: 12px;
      color: #dc2626;
      min-height: 16px;
      margin-bottom: 12px;
    }

    .btn-primary {
      width: 100%;
      padding: 9px;
      background: #2563eb;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }

    /* ── Logged-in view ─────────────────────────────────────────── */

    #loggedin-view {
      padding: 20px;
      display: none;
    }

    .user-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .avatar {
      width: 34px;
      height: 34px;
      background: #dbeafe;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: #2563eb;
      flex-shrink: 0;
    }

    .user-info {
      min-width: 0;
    }

    .user-email {
      font-size: 13px;
      font-weight: 500;
      color: #111827;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-tier {
      font-size: 11px;
      color: #6b7280;
      margin-top: 1px;
    }

    .usage-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }

    .usage-label {
      font-size: 11px;
      font-weight: 500;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .usage-count {
      font-size: 22px;
      font-weight: 700;
      color: #111827;
      line-height: 1;
    }

    .usage-count span {
      font-size: 13px;
      font-weight: 400;
      color: #6b7280;
    }

    .usage-bar-track {
      margin-top: 8px;
      height: 4px;
      background: #e5e7eb;
      border-radius: 2px;
      overflow: hidden;
    }

    .usage-bar-fill {
      height: 100%;
      background: #2563eb;
      border-radius: 2px;
      transition: width 0.3s;
    }

    .usage-reset {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 6px;
    }

    .btn-secondary {
      width: 100%;
      padding: 8px;
      background: #ffffff;
      color: #374151;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-secondary:hover {
      background: #f9fafb;
      border-color: #9ca3af;
    }

    #usage-error {
      font-size: 12px;
      color: #dc2626;
      min-height: 16px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-logo"></div>
    <h1>JobCrawler</h1>
  </div>

  <!-- ── Login state ─────────────────────────────────────────────── -->
  <div id="login-view">
    <p class="subtitle" style="margin-top:14px;">Sign in to your account</p>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="email-input">Email</label>
        <input id="email-input" type="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="password-input">Password</label>
        <input id="password-input" type="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <p id="login-error"></p>
      <button id="login-btn" class="btn-primary" type="submit">Login</button>
    </form>
  </div>

  <!-- ── Logged-in state ────────────────────────────────────────── -->
  <div id="loggedin-view">
    <div class="user-row" style="margin-top:14px;">
      <div class="avatar" id="user-avatar">?</div>
      <div class="user-info">
        <div class="user-email" id="user-email-display">—</div>
        <div class="user-tier" id="user-tier-display"></div>
      </div>
    </div>

    <div class="usage-card">
      <div class="usage-label">Usage this week</div>
      <div class="usage-count" id="usage-count">— <span>/ —</span></div>
      <div class="usage-bar-track">
        <div class="usage-bar-fill" id="usage-bar" style="width:0%"></div>
      </div>
      <div class="usage-reset" id="usage-reset"></div>
    </div>

    <p id="usage-error"></p>
    <button id="logout-btn" class="btn-secondary">Logout</button>
  </div>

  <script src="dist/popup.js" type="module"></script>
</body>
</html>
