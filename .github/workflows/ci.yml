name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── API ───────────────────────────────────────────────────────────────────
  api:
    name: API (Python 3.12)
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      JWT_SECRET_KEY: "ci-test-secret-key-32-characters-long"
      APP_ENV: "development"
      REDIS_URL: ""
      GROQ_API_KEY: ""
      OPENROUTER_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: pip install -r api/requirements.txt pytest pytest-asyncio anyio httpx aiosqlite

      - name: Run tests
        run: pytest api/tests/ -v --tb=short
        working-directory: .

  # ─── Web ───────────────────────────────────────────────────────────────────
  web:
    name: Web (Vite + TS)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Type check + build
        run: npm run build
        working-directory: web

  # ─── Extension ─────────────────────────────────────────────────────────────
  extension:
    name: Extension (esbuild + TS)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: extension

      - name: Build
        run: npm run build
        working-directory: extension

      - name: Test
        run: npm test
        working-directory: extension

      - name: Upload extension artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: extension/dist/
          retention-days: 30
