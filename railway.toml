[build]
builder = "dockerfile"
dockerfilePath = "api/Dockerfile"

[deploy]
startCommand = "sh -c 'python -m alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port $PORT --workers 2'"
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "api"
